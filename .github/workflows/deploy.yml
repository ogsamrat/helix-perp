name: Deploy (Vercel)

# Deploys the web terminal to Vercel production on merge to main.
# Requires three repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — a Vercel access token
#   VERCEL_ORG_ID      — from web/.vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — from web/.vercel/project.json after `vercel link`

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner != '' }}
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
